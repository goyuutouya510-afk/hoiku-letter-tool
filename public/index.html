<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>保育お便り帳ジェネレーター</title>
  <style>
    :root {
      color-scheme: light;
      font-family: "Hiragino Sans", "Noto Sans JP", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --accent: #ff9f43;
      --accent-dark: #e07000;
      --bg: #f5f5fb;
      --card-bg: #fff;
      --text: #1b1f3b;
      --muted: #5f6388;
      --border: #e0e3f1;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
    }

    .page {
      max-width: 960px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 32px;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 8px;
    }

    p.lead {
      color: var(--muted);
      margin: 0;
      font-size: 1rem;
    }

    .layout {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
      align-items: start;
    }

    form, .preview {
      background: var(--card-bg);
      border-radius: 18px;
      border: 1px solid var(--border);
      padding: 24px;
      box-shadow: 0 12px 35px rgba(18, 24, 45, 0.08);
    }

    form h2, .preview h2 {
      margin-top: 0;
      font-size: 1.2rem;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
    }

    input, textarea, select, button {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      font: inherit;
      background: #fff;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    .field {
      margin-bottom: 16px;
    }

    button {
      background: var(--accent);
      color: #fff;
      border: none;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    button:hover:not(:disabled) {
      background: var(--accent-dark);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 16px;
    }

    .badge {
      background: rgba(255, 159, 67, 0.12);
      color: var(--accent-dark);
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: 600;
    }

    #output {
      background: #fafaff;
      border: 1px dashed var(--border);
      border-radius: 12px;
      padding: 18px;
      min-height: 200px;
      white-space: pre-line;
      line-height: 1.8;
    }

    .empty-state {
      color: var(--muted);
      text-align: center;
      margin-top: 32px;
    }

    .hint {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 6px;
      line-height: 1.4;
    }

    .status {
      margin-top: 12px;
      font-weight: 600;
    }

    .status.error {
      color: #c62828;
    }

    .status.success {
      color: #2e7d32;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      border: 0;
    }

    @media (max-width: 600px) {
      body {
        padding: 16px;
      }

      .layout {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <h1>保育お便り帳ジェネレーター</h1>
      <p class="lead">キーワードを入力すると、ChatGPTが日々のお便りを日本語と英語で作成します。</p>
    </header>
    <div id="authBar" style="display:flex; gap:10px; justify-content:center; align-items:center; margin: 0 0 18px;">
  <button id="loginBtn" type="button" style="width:auto; padding:10px 14px;">Googleでログイン</button>
  <button id="logoutBtn" type="button" style="width:auto; padding:10px 14px; display:none;">ログアウト</button>
  <span id="userLabel" style="color: var(--muted); font-weight:600;">未ログイン</span>
</div>


    <div class="layout">
      <form id="noteForm" aria-label="お便り入力フォーム">
        <h2>キーワード入力</h2>
        <div class="field">
          <label for="date">日付</label>
          <input type="date" id="date" name="date" required />
        </div>
        <div class="field">
          <label for="weather">今日の気候</label>
          <input type="text" id="weather" name="weather" placeholder="例：穏やかな晴れ／雨上がりの涼しさ" />
        </div>
        <div class="field">
          <label for="group">所属（クラス・園名など）</label>
          <input type="text" id="group" name="group" placeholder="例：さくら組" />
        </div>
        <div class="field">
          <label for="name">園児の名前</label>
          <input type="text" id="name" name="name" placeholder="例：たろうくん" />
        </div>
        <div class="field">
          <label for="event">イベント・活動</label>
          <input type="text" id="event" name="event" placeholder="例：園庭での泥遊び" />
        </div>
        <div class="field">
          <label for="notes">園児の様子・キーワード</label>
          <textarea id="notes" name="notes" placeholder="例：集中して砂山づくり／友だちと協力" required></textarea>
        </div>
        <button id="generateBtn" type="submit" disabled>ChatGPTに作成してもらう</button>

        <p id="statusMessage" aria-live="polite" class="hint status"></p>
      </form>

      <section class="preview" aria-live="polite">
        <div class="controls">
          <h2>プレビュー</h2>
          <span class="badge">翻訳</span>
          <label for="languageToggle" class="sr-only">言語選択</label>
          <select id="languageToggle">
            <option value="ja">日本語</option>
            <option value="en">English</option>
          </select>
        </div>
        <div id="output" class="empty-state">左のフォームからキーワードを入力し、ChatGPTに作成を依頼してください。</div>
      </section>
    </div>
  </div>

<script>
  const form = document.getElementById("noteForm");
  const output = document.getElementById("output");
  const languageToggle = document.getElementById("languageToggle");
  const statusMessage = document.getElementById("statusMessage");
  const submitButton = document.getElementById("generateBtn");

  const BACKEND_ENDPOINT = "https://us-central1-hoiku-letter-tool.cloudfunctions.net/api/hoiku-letter";
  const BACKEND_ENDPOINT_EN = "https://us-central1-hoiku-letter-tool.cloudfunctions.net/api/hoiku-letter-en";

  let lastGenerated = null;

  const setStatus = (text, type = "info") => {
    statusMessage.textContent = text || "";
    statusMessage.className = `hint status${type ? ` ${type}` : ""}`;
  };

  const updatePreview = () => {
    if (!lastGenerated) return;
    const language = languageToggle.value;
    output.classList.remove("empty-state");
    output.textContent =
      lastGenerated[language] || "選択した言語の文章がありません。";
  };

  const getRequiredIdToken = async () => {
    const token = await window.getIdTokenOrNull?.();
    if (!token) {
      throw new Error("ログインが必要です。Googleログイン後に実行してください。");
    }
    return token;
  };

  const postWithAuth = async (url, body, token) => {
    return fetch(url, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        Authorization: `Bearer ${token}`,
      },
      body: JSON.stringify(body),
    });
  };

  languageToggle.addEventListener("change", updatePreview);

  form.addEventListener("submit", async (event) => {
    event.preventDefault();

    setStatus("お便りを作成中です（約5秒）…", "info");
    submitButton.disabled = true;
    submitButton.textContent = "生成中…";

    const formData = new FormData(form);
    const payload = {
      date: formData.get("date"),
      weather: formData.get("weather"),
      group: formData.get("group"),
      name: formData.get("name"),
      event: formData.get("event"),
      notes: formData.get("notes") || "",
    };

    try {
      const idToken = await getRequiredIdToken();

      submitButton.textContent = "日本語生成中…";

      const resJa = await postWithAuth(`${BACKEND_ENDPOINT}?lang=ja`, payload, idToken);
      if (!resJa.ok) {
        const data = await resJa.json().catch(() => ({}));
        throw new Error(data.error || `日本語生成エラー (${resJa.status})`);
      }

      const jaData = await resJa.json();
      lastGenerated = {
        ja: jaData.ja || jaData.text || "日本語の文章を取得できませんでした。",
        en: "英語を生成中…",
      };
      setStatus("日本語ができました。英語を生成中…", "success");
      updatePreview();

      submitButton.textContent = "英語生成中…";

      const resEn = await postWithAuth(
        `${BACKEND_ENDPOINT_EN}?lang=en`,
        { jaText: lastGenerated.ja },
        idToken
      );
      if (!resEn.ok) {
        const data = await resEn.json().catch(() => ({}));
        setStatus(`英語生成に失敗: ${data.error || resEn.status}`, "error");
      } else {
        const enData = await resEn.json();
        lastGenerated.en = enData.en || enData.text || "English version was not provided.";
        setStatus("生成が完了しました。", "success");
      }

      updatePreview();
    } catch (error) {
      console.error(error);
      setStatus(error.message || "エラーが発生しました。", "error");
    } finally {
      const token = await window.getIdTokenOrNull?.();
      submitButton.disabled = !token;
      submitButton.textContent = "ChatGPTに作成してもらう";
    }
  });
</script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getAuth,
    GoogleAuthProvider,
    signInWithPopup,
    signOut,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA7AccAmKVEH9ZeCL2Uhnak0qV1lumKCrE",
    authDomain: "hoiku-letter-tool.firebaseapp.com",
    projectId: "hoiku-letter-tool",
    storageBucket: "hoiku-letter-tool.firebasestorage.app",
    messagingSenderId: "448453988298",
    appId: "1:448453988298:web:6dc32c24ef2b79d0ae0933",
    measurementId: "G-VV4VCGL86X"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  async function getIdTokenOrNull() {
    const user = auth.currentUser;
    if (!user) return null;
    return user.getIdToken();
  }

  window.getIdTokenOrNull = getIdTokenOrNull;


  const provider = new GoogleAuthProvider();

  const loginBtn = document.getElementById("loginBtn");
  const logoutBtn = document.getElementById("logoutBtn");
  const userLabel = document.getElementById("userLabel");
  const generateBtn = document.getElementById("generateBtn");

  console.log("auth module loaded");
  console.log("loginBtn:", loginBtn);

  loginBtn.addEventListener("click", async () => {
  console.log("login clicked");
  try {
    await signInWithPopup(auth, provider);
    console.log("login success");
  } catch (e) {
    console.error(e);
    alert(e?.message || e);
  }
});


  logoutBtn.addEventListener("click", async () => {
    await signOut(auth);
  });

  onAuthStateChanged(auth, (user) => {
    if (user) {
      userLabel.textContent = `ログイン中：${user.displayName || user.email || "ユーザー"}`;
      loginBtn.style.display = "none";
      logoutBtn.style.display = "inline-block";
      generateBtn.disabled = false;
    } else {
      userLabel.textContent = "未ログイン";
      loginBtn.style.display = "inline-block";
      logoutBtn.style.display = "none";
      generateBtn.disabled = true;
    }
  });
</script>
</body>
</html>
