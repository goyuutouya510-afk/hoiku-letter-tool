<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>保育お便り帳ジェネレーター</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="page">
    <header>
      <h1>保育お便り帳ジェネレーター</h1>
      <p class="lead">キーワードを入力すると、ChatGPTが日々のお便りを日本語と英語で作成します。</p>
    </header>
    <div id="authBar" class="auth-bar">
      <button id="loginBtn" class="auth-button" type="button">Googleでログイン</button>
      <button id="logoutBtn" class="auth-button auth-button-hidden" type="button">ログアウト</button>
      <span id="userLabel" class="user-label">未ログイン</span>
    </div>
    <section class="plan-card" aria-live="polite">
      <div class="plan-meta">
        <p id="planLabel" class="plan-text">現在のプラン: free</p>
        <p id="usageLabel" class="plan-subtext">本日の残り回数: 1/1</p>
        <p class="plan-note">plusプランは現在テスト販売中です。お申し込み後に利用方法をご案内します。</p>
      </div>
      <button id="plusPlanBtn" class="secondary-button" type="button">plusプランに申し込む</button>
    </section>

    <div class="layout">
      <form id="noteForm" aria-label="お便り入力フォーム">
        <h2>キーワード入力</h2>
        <div class="field">
          <label for="date">日付</label>
          <input type="date" id="date" name="date" required />
        </div>
        <div class="field">
          <label for="weather">今日の気候</label>
          <input type="text" id="weather" name="weather" placeholder="例：穏やかな晴れ／雨上がりの涼しさ" />
        </div>
        <div class="field">
          <label for="group">所属（クラス・園名など）</label>
          <input type="text" id="group" name="group" placeholder="例：さくら組" />
        </div>
        <div class="field">
          <label for="name">園児の名前</label>
          <input type="text" id="name" name="name" placeholder="例：たろうくん" />
        </div>
        <div class="field">
          <label for="event">イベント・活動</label>
          <input type="text" id="event" name="event" placeholder="例：園庭での泥遊び" />
        </div>
        <div class="field">
          <label for="notes">園児の様子・キーワード</label>
          <textarea id="notes" name="notes" placeholder="例：集中して砂山づくり／友だちと協力" required></textarea>
        </div>
        <div id="lengthField" class="field hidden">
          <label for="length">文章量</label>
          <select id="length" name="length">
            <option value="short">短め</option>
            <option value="normal" selected>標準</option>
            <option value="long">長め</option>
          </select>
        </div>
        <button id="generateBtn" type="submit" disabled>ChatGPTに作成してもらう</button>

        <p id="statusMessage" aria-live="polite" class="hint status"></p>
      </form>

      <section class="preview" aria-live="polite">
        <div class="controls">
          <h2>プレビュー</h2>
          <span class="badge">翻訳</span>
          <label for="languageToggle" class="sr-only">言語選択</label>
          <select id="languageToggle">
            <option value="ja">日本語</option>
            <option id="englishOption" value="en">English</option>
          </select>
        </div>
        <p id="featureHint" class="hint">freeプランでは日本語生成のみ利用できます。</p>
        <div id="output" class="empty-state">左のフォームからキーワードを入力し、ChatGPTに作成を依頼してください。</div>
      </section>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
