<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>保育お便り帳ジェネレーター</title>
  <style>
    :root {
      color-scheme: light;
      font-family: "Hiragino Sans", "Noto Sans JP", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --accent: #ff9f43;
      --accent-dark: #e07000;
      --bg: #f5f5fb;
      --card-bg: #fff;
      --text: #1b1f3b;
      --muted: #5f6388;
      --border: #e0e3f1;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
    }

    .page {
      max-width: 960px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 32px;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 8px;
    }

    p.lead {
      color: var(--muted);
      margin: 0;
      font-size: 1rem;
    }

    .layout {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
      align-items: start;
    }

    form, .preview {
      background: var(--card-bg);
      border-radius: 18px;
      border: 1px solid var(--border);
      padding: 24px;
      box-shadow: 0 12px 35px rgba(18, 24, 45, 0.08);
    }

    form h2, .preview h2 {
      margin-top: 0;
      font-size: 1.2rem;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
    }

    input, textarea, select, button {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      font: inherit;
      background: #fff;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    .field {
      margin-bottom: 16px;
    }

    button {
      background: var(--accent);
      color: #fff;
      border: none;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    button:hover:not(:disabled) {
      background: var(--accent-dark);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 16px;
    }

    .badge {
      background: rgba(255, 159, 67, 0.12);
      color: var(--accent-dark);
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: 600;
    }

    #output {
      background: #fafaff;
      border: 1px dashed var(--border);
      border-radius: 12px;
      padding: 18px;
      min-height: 200px;
      white-space: pre-line;
      line-height: 1.8;
    }

    .empty-state {
      color: var(--muted);
      text-align: center;
      margin-top: 32px;
    }

    .hint {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 6px;
      line-height: 1.4;
    }

    .status {
      margin-top: 12px;
      font-weight: 600;
    }

    .status.error {
      color: #c62828;
    }

    .status.success {
      color: #2e7d32;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      border: 0;
    }

    @media (max-width: 600px) {
      body {
        padding: 16px;
      }

      .layout {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <h1>保育お便り帳ジェネレーター</h1>
      <p class="lead">キーワードを入力すると、ChatGPTが日々のお便りを日本語と英語で作成します。</p>
    </header>

    <div class="layout">
      <form id="noteForm" aria-label="お便り入力フォーム">
        <h2>キーワード入力</h2>
        <div class="field">
          <label for="apiKey">OpenAI APIキー</label>
          <input type="password" id="apiKey" name="apiKey" placeholder="sk-..." autocomplete="off" />
          <p class="hint">ブラウザに保存され、ChatGPT呼び出しのみに使用されます。</p>
        </div>
        <div class="field">
          <label for="date">日付</label>
          <input type="date" id="date" name="date" required />
        </div>
        <div class="field">
          <label for="weather">今日の気候</label>
          <input type="text" id="weather" name="weather" placeholder="例：穏やかな晴れ／雨上がりの涼しさ" />
        </div>
        <div class="field">
          <label for="group">所属（クラス・園名など）</label>
          <input type="text" id="group" name="group" placeholder="例：さくら組" />
        </div>
        <div class="field">
          <label for="name">園児の名前</label>
          <input type="text" id="name" name="name" placeholder="例：たろうくん" />
        </div>
        <div class="field">
          <label for="event">イベント・活動</label>
          <input type="text" id="event" name="event" placeholder="例：園庭での泥遊び" />
        </div>
        <div class="field">
          <label for="notes">園児の様子・キーワード</label>
          <textarea id="notes" name="notes" placeholder="例：集中して砂山づくり／友だちと協力" required></textarea>
        </div>
        <button type="submit">ChatGPTに作成してもらう</button>
        <p id="statusMessage" aria-live="polite" class="hint status"></p>
      </form>

      <section class="preview" aria-live="polite">
        <div class="controls">
          <h2>プレビュー</h2>
          <span class="badge">翻訳</span>
          <label for="languageToggle" class="sr-only">言語選択</label>
          <select id="languageToggle">
            <option value="ja">日本語</option>
            <option value="en">English</option>
          </select>
        </div>
        <div id="output" class="empty-state">左のフォームからキーワードを入力し、ChatGPTに作成を依頼してください。</div>
      </section>
    </div>
  </div>

  <script>
    const form = document.getElementById("noteForm");
    const output = document.getElementById("output");
    const languageToggle = document.getElementById("languageToggle");
    const apiKeyInput = document.getElementById("apiKey");
    const statusMessage = document.getElementById("statusMessage");
    const submitButton = form.querySelector("button[type='submit']");

    const API_KEY_STORAGE = "hoikuNoteApiKey";
    const API_ENDPOINT = "https://api.openai.com/v1/chat/completions";
    const MODEL = "gpt-4o-mini";

    let lastGenerated = null;

    const storedKey = localStorage.getItem(API_KEY_STORAGE);
    if (storedKey) {
      apiKeyInput.value = storedKey;
    }

    apiKeyInput.addEventListener("change", () => {
      const key = apiKeyInput.value.trim();
      if (key) {
        localStorage.setItem(API_KEY_STORAGE, key);
      } else {
        localStorage.removeItem(API_KEY_STORAGE);
      }
    });

    const setStatus = (text, type = "info") => {
      statusMessage.textContent = text || "";
      statusMessage.className = `hint status${type ? ` ${type}` : ""}`;
    };

    const formatDate = (value, locale, options) => {
      if (!value) return "";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      return new Intl.DateTimeFormat(locale, options).format(date);
    };

    const sanitizeChildName = (rawName) => {
      if (!rawName) {
        return { honorific: "お子さん", english: "your child" };
      }
      const trimmed = rawName.trim();
      if (!trimmed) {
        return { honorific: "お子さん", english: "your child" };
      }
      const parts = trimmed.split(/\s+/);
      const given = parts[parts.length - 1].replace(/(くん|ちゃん|さん)$/u, "");
      const base = given || "お子さん";
      return { honorific: `${base}さん`, english: base };
    };

    const buildMessages = ({ date, weather, group, name, event, notes }) => {
      const formattedDateJa = formatDate(date, "ja-JP", { year: "numeric", month: "long", day: "numeric", weekday: "long" });
      const formattedDateEn = formatDate(date, "en-US", { year: "numeric", month: "long", day: "numeric", weekday: "long" });
      const safeGroup = group || "保育室";
      const childNames = sanitizeChildName(name);
      const mainEvent = event || "本日の活動";
      const observation = (notes || "").trim() || "ゆったりと友だちと関わっていました";
      const weatherText = (weather || "").trim() || "穏やかな気候";

      return [
        {
          role: "system",
          content: "あなたはベテランの保育士です。保護者にわかりやすく寄り添うような文章でお便り帳を作成します。"
        },
        {
          role: "user",
          content:
`条件は以下の通り。
1. 文章は今日の気候の描写から書き始める。
2. 園での様子からご家庭への呼びかけにつながる自然な段落構成にする。
3. 園児の呼称は常に「${childNames.honorific}」とし、英語版では「${childNames.english}」と記す。
4. 観察キーワードは本文に溶け込ませ、「様子メモ」という表現は使わない。
5. 日本語と英語の2つの文章を用意し、同じ情報と温度感を伝える。

入力情報:
- 日付（和文）: ${formattedDateJa}
- Date (English): ${formattedDateEn}
- 気候: ${weatherText}
- 所属: ${safeGroup}
- 園児の呼称: ${childNames.honorific}
- 英語表記: ${childNames.english}
- 活動: ${mainEvent}
- 観察キーワード: ${observation}

出力形式:
JSON文字列のみで回答してください (例: {"ja":"...","en":"..."})。余計な装飾やマークダウンは不要です。`
        }
      ];
    };

    const callChatGPT = async (apiKey, payload) => {
      const response = await fetch(API_ENDPOINT, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          Authorization: `Bearer ${apiKey}`
        },
        body: JSON.stringify({
          model: MODEL,
          messages: buildMessages(payload),
          temperature: 0.7
        })
      });

      if (!response.ok) {
        const text = await response.text();
        throw new Error(`APIエラー (${response.status}): ${text}`);
      }

      const data = await response.json();
      const content = data.choices?.[0]?.message?.content?.trim();
      if (!content) {
        throw new Error("ChatGPTから応答を取得できませんでした。");
      }
      try {
        return JSON.parse(content);
      } catch (error) {
        throw new Error("ChatGPTの返答をJSONとして解析できませんでした。返答: " + content);
      }
    };

    const updatePreview = () => {
      if (!lastGenerated) return;
      const language = languageToggle.value;
      output.classList.remove("empty-state");
      output.textContent = lastGenerated[language] || "選択した言語の文章がありません。";
    };

    languageToggle.addEventListener("change", updatePreview);

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const apiKey = apiKeyInput.value.trim();
      if (!apiKey) {
        setStatus("OpenAI APIキーを入力してください。", "error");
        return;
      }

      setStatus("ChatGPTに作成を依頼しています…");
      submitButton.disabled = true;

      const formData = new FormData(form);
      const payload = {
        date: formData.get("date"),
        weather: formData.get("weather"),
        group: formData.get("group"),
        name: formData.get("name"),
        event: formData.get("event"),
        notes: formData.get("notes") || ""
      };

      try {
        const result = await callChatGPT(apiKey, payload);
        lastGenerated = {
          ja: result.ja || "日本語の文章を取得できませんでした。",
          en: result.en || "English version was not provided."
        };
        setStatus("生成が完了しました。", "success");
        updatePreview();
      } catch (error) {
        console.error(error);
        setStatus(error.message, "error");
      } finally {
        submitButton.disabled = false;
      }
    });
  </script>
</body>
</html>
